<!doctype html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7" lang="{{ page.lang | default: 'en' }}"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8" lang="{{ page.lang | default: 'en' }}"><![endif]-->
<!--[if (IE 8)&!(IEMobile)]><html class="no-js lt-ie9" lang="{{ page.lang | default: 'en' }}"><![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js" lang="{{ page.lang | default: 'en' }}"><!--<![endif]-->

<head>
{% include head.html %}
</head>

<body class="page" itemscope itemtype="http://schema.org/WebPage">
{% include chrome-frame.html %}
{% include navigation.html %}

{% if page.image.feature %}<div class="image-wrap">
  <img src="{{ '/images/' | append: page.image.feature | relative_url }}" alt="{{ page.title }} feature image" itemprop="primaryImageOfPage">
</div>{% endif %}

<div id="main" role="main" itemprop="mainContentOfPage">
  <div class="article-author-top">
    {% include author-bio.html %}
  </div>
  <article itemscope itemtype="http://schema.org/CreativeWork">
    <div class="headline-wrap">
      <h1 itemprop="headline">{{ page.title }}</h1>
    </div>
    <div class="article-wrap" itemprop="text">
      {{ content }}
    </div>
  </article>
</div>

<div class="footer-wrap">
  <footer>
    {% include footer.html %}
  </footer>
</div>

{% include scripts.html %}
</body>
</html>
