<img src="{{ '/images/' | append: site.owner.avatar | relative_url }}" class="bio-photo" alt="{{ site.owner.name }} profile photo" width="100" height="100">

<p><strong>{{ site.owner.name }}</strong><br>{{ site.owner.position }}<br>{{ site.owner.affiliation }}</p>

{% if site.owner.email %}<p style="text-indent:0;margin-top:1.5em;"><a href="mailto:{{ site.owner.email }}"><i class="icon-mail"></i> Email</a></p>{% endif %}

{% if site.owner.github %}<p style="text-indent:0;"><a href="https://github.com/{{ site.owner.github }}"><i class="icon-github"></i> GitHub</a></p>{% endif %}

{% if site.owner.scholar %}<p style="text-indent:0;"><a href="{{ site.owner.scholar }}"><i class="ai ai-google-scholar-square"></i> Google Scholar</a></p>{% endif %}
