bio_en: "Guanbo Wang is an Assistant Research Fellow at the Kunming Institute of Zoology, Chinese Academy of Sciences. He received his Ph.D. in Information and Communication Engineering from Yunnan University. His research focuses on computer vision for non-human primate visual perception and behavior understanding, including macaque detection, individual identification, pose estimation, multi-view perception, long-term identity association, and multi-camera cage monitoring. His previous research focused on lightweight object detection, multimodal remote sensing, forest wildfire detection, and edge deployment."
bio_zh: "王冠博，博士，中国科学院昆明动物研究所助理研究员。博士毕业于云南大学信息与通信工程专业。博士阶段主要围绕无人机遥感森林火灾检测、轻量化目标检测、多模态目标检测与边缘端实时部署开展研究，相关成果发表于 IEEE Transactions on Circuits and Systems for Video Technology、IEEE Transactions on Geoscience and Remote Sensing、Expert Systems with Applications、Digital Signal Processing 等期刊。当前研究主要面向非人灵长类动物视觉感知与行为理解，重点关注群笼猕猴场景下的个体检测、个体识别、关键点检测、跨视角一致归属、长时轨迹维持、多模态行为识别与情感状态评估等问题。"
